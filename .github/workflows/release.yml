name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --features frp

      - name: Run tests
        run: cargo test --lib --features frp

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  version-bump:
    name: Version bump
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump to next patch version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}\"/" Cargo.toml
          echo "NEXT_VERSION=${NEXT_VERSION}" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: prepare for next release (${NEXT_VERSION})"
          git push

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux
            target: x86_64-unknown-linux-gnu
            artifact: tenover-frp
            asset_name: tenover-frp-linux-x86_64
          - name: windows
            target: x86_64-pc-windows-gnu
            artifact: tenover-frp.exe
            asset_name: tenover-frp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Add cross-compile target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            sudo apt-get install -y mingw-w64
          fi

      - name: Build release binary
        run: cargo build --release --features frp --bin tenover-frp --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp tenover-frp-linux-x86_64/tenover-frp dist/tenover-frp-linux-x86_64
          cp tenover-frp-windows-x86_64.exe/tenover-frp.exe dist/tenover-frp-windows-x86_64.exe
          chmod +x dist/tenover-frp-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tenover-frp-windows-x86_64.exe
            dist/tenover-frp-linux-x86_64
